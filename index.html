<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>IMPACT — Advertising & Printing</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:Inter;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:center;
padding:20px 10px;
border-bottom:1px solid rgba(255,255,255,.1);
position:relative;
}

.logo{
position:absolute;
left:10px;
width:90px;
height:90px;
object-fit:contain;
border-radius:20px;
background:#111;
padding:6px;
}

.brand{
font-size:28px;
font-weight:900;
}

.search-btn{
position:absolute;
right:10px;
cursor:pointer;
background:#111;
border-radius:14px;
padding:8px 10px;
}

/* SEARCH */

.search{
padding:12px;
display:none;
}

.search input{
width:100%;
padding:14px;
border-radius:14px;
border:none;
background:#111;
color:#fff;
font-weight:700;
}

/* POPULAR */

.title{
padding:16px;
font-weight:900;
font-size:18px;
}

.popular-row{
display:flex;
gap:12px;
overflow:auto;
padding:0 12px 14px;
}

.popular-card{
min-width:170px;
background:#111;
border-radius:20px;
padding:12px;
text-align:center;
}

.popular-card img{
width:130px;
height:130px;
object-fit:cover;
border-radius:16px;
}

/* CONSULT */

.consult{
background:#111;
margin:12px;
padding:14px;
border-radius:20px;
}

.consult input{
width:100%;
margin-top:8px;
padding:14px;
border-radius:14px;
border:none;
background:#000;
color:#fff;
}

.btn{
margin-top:10px;
padding:14px;
border-radius:14px;
border:none;
background:#2563EB;
color:#fff;
font-weight:900;
width:100%;
cursor:pointer;
}

/* CALC */

.calc{
background:#111;
margin:12px;
padding:14px;
border-radius:20px;
}

.calc input,.calc textarea{
width:100%;
margin-top:6px;
padding:12px;
border-radius:14px;
border:none;
background:#000;
color:#fff;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:12px;
}

.card{
background:#111;
border-radius:20px;
padding:10px;
text-align:center;

transform:translateY(20px);
opacity:0;

animation:fadeIn .5s forwards;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:140px;
height:140px;
object-fit:cover;
border-radius:16px;
cursor:pointer;
}

.name{
margin-top:6px;
font-weight:800;
}

@keyframes fadeIn{

to{
transform:translateY(0);
opacity:1;
}

}

/* IMAGE MODAL */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

.modal img{
max-width:90%;
max-height:90%;
border-radius:20px;
}

</style>
</head>

<body>

<div class="header">

<img src="images/logo.png" class="logo">

<div class="brand">IMPACT</div>

<div class="search-btn" onclick="toggleSearch()">🔍</div>

</div>

<div class="search" id="searchBox">
<input id="searchInput" placeholder="Поиск услуги..." oninput="searchProducts()">
</div>

<div class="title">🔥 Популярное</div>

<div class="popular-row" id="popularRow"></div>

<div class="consult">

<b>💬 Консультация</b>

<input id="consultInput" placeholder="Например: 1000 визиток">

<button class="btn" onclick="sendConsult()">Отправить</button>

</div>

<div class="calc">

<b>🧾 Рассчитать стоимость</b>

<input id="calcService" placeholder="Услуга">
<input id="calcQty" placeholder="Количество">
<input id="calcSize" placeholder="Размер">
<input id="calcDeadline" placeholder="Срок">

<textarea id="calcComment" placeholder="Комментарий"></textarea>

<button class="btn" onclick="sendCalc()">Отправить на расчет</button>

</div>

<div class="products" id="products"></div>

<div class="modal" id="imgModal" onclick="closeModal()">
<img id="modalImg">
</div>

<script>

Telegram.WebApp.ready()

const SERVICES=[

{ name:"Визитка", img:"images/services_vizitka.jpg" },

{ name:"Оракал", img:"images/services_oracal.jpg" },

{ name:"Сетка Оракал", img:"images/services_oracal_grid.jpg" },

{ name:"Банер", img:"images/services_banner.jpg" },

{ name:"Подарочный набор с Лого", img:"images/services_gift.jpg" },

{ name:"Таблички", img:"images/services_sign.jpg" },

{ name:"Стелла", img:"images/services_stella.jpg" },

{ name:"Наружные объёмные буквы", img:"images/services_letters.jpg" },

{ name:"Лайт бокс", img:"images/services_lightbox.jpg" },

{ name:"Билборд", img:"images/services_billboard.jpg" },

{ name:"УФ печать", img:"images/services_uv.jpg" },

{ name:"Бейджи для персонала", img:"images/services_badge.jpg" },

{ name:"Бейджи на шнурке", img:"images/services_lanyard.jpg" },

{ name:"Дизайн вашего Лого", img:"images/services_logo.jpg" },

{ name:"Графический дизайн", img:"images/services_design.jpg" },

{ name:"Авто Брендинг", img:"images/services_auto.jpg" },

{ name:"Флаер Листовка", img:"images/services_flyer.jpg" }

]

const POPULAR=[0,1,3,13]

function renderPopular(){

const row=document.getElementById("popularRow")

POPULAR.forEach(i=>{

const s=SERVICES[i]

row.innerHTML+=`

<div class="popular-card">

<img src="${s.img}" onclick="openModal('${s.img}')">

<div class="name">${s.name}</div>

</div>

`

})

}

function renderProducts(){

const box=document.getElementById("products")

SERVICES.forEach((s,i)=>{

box.innerHTML+=`

<div class="card" style="animation-delay:${i*0.05}s">

<img src="${s.img}" onclick="openModal('${s.img}')">

<div class="name">${s.name}</div>

</div>

`

})

}

renderPopular()
renderProducts()

/* SEARCH */

function toggleSearch(){

const s=document.getElementById("searchBox")

s.style.display=s.style.display==="none"?"block":"none"

}

function searchProducts(){

const q=document.getElementById("searchInput").value.toLowerCase()

const box=document.getElementById("products")

box.innerHTML=""

SERVICES.filter(x=>x.name.toLowerCase().includes(q))
.forEach((s,i)=>{

box.innerHTML+=`

<div class="card">

<img src="${s.img}" onclick="openModal('${s.img}')">

<div class="name">${s.name}</div>

</div>

`

})

}

/* MODAL */

function openModal(src){

document.getElementById("modalImg").src=src

document.getElementById("imgModal").style.display="flex"

}

function closeModal(){

document.getElementById("imgModal").style.display="none"

}

/* CONSULT */

function sendConsult(){

const t=document.getElementById("consultInput").value

Telegram.WebApp.sendData(JSON.stringify({type:"consult",text:t}))

}

/* CALC */

function sendCalc(){

const data={

type:"calc",

service:calcService.value,

qty:calcQty.value,

size:calcSize.value,

deadline:calcDeadline.value,

comment:calcComment.value

}

Telegram.WebApp.sendData(JSON.stringify(data))

}

</script>

</body>
</html>
